name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Tests & Linting
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        cd netracare_backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run pylint checks
      run: |
        cd netracare_backend
        pylint features/ routes/ models/ core/ --disable=all --enable=E,F 2>/dev/null || true
    
    - name: Run pytest unit tests
      run: |
        cd netracare_backend
        python -m pytest tests/ -v --tb=short
    
    - name: Run test coverage
      run: |
        cd netracare_backend
        python -m pytest tests/ --cov=features --cov=routes --cov=models --cov-report=term-missing

  flutter-tests:
    name: Flutter Tests & Analysis
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.10.0'
        cache: true
    
    - name: Get Flutter dependencies
      run: |
        cd netracare
        flutter pub get
    
    - name: Run Flutter analysis
      run: |
        cd netracare
        flutter analyze
    
    - name: Run Flutter tests
      run: |
        cd netracare
        flutter test --coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./netracare/coverage/lcov.info
        flags: flutter

  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: backend-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build backend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./netracare_backend
        push: false
        tags: netracare-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, flutter-tests]
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: netracare_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install backend dependencies
      run: |
        cd netracare_backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run integration tests
      env:
        REDIS_URL: redis://localhost:6379/0
        DATABASE_URL: postgresql://test:test@localhost:5432/netracare_test
      run: |
        cd netracare_backend
        python -m pytest tests/test_blink_notification.py -v
        python -m pytest tests/test_eye_tracking_notification.py -v

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [backend-tests, flutter-tests, build-backend, integration-tests]
    if: always()
    
    steps:
    - name: Check test results
      run: |
        if [ "${{ needs.backend-tests.result }}" != "success" ]; then
          echo "Backend tests failed"
          exit 1
        fi
        if [ "${{ needs.flutter-tests.result }}" != "success" ]; then
          echo "Flutter tests failed"
          exit 1
        fi
        echo "All tests passed!"
