name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install pre-commit
        run: |
          pip install pre-commit
          pre-commit install --install-hooks || true

      - name: Run pre-commit
        run: pre-commit run --all-files || true

      - name: Run tests
        run: pytest -q
name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r netracare_backend/requirements.txt -r netracare_backend/requirements-dev.txt

      - name: Dependency audit
        run: |
          pip-audit || true

      - name: Run linters
        run: |
          python -m pip install -r netracare_backend/requirements-dev.txt
          black --check .
          flake8 netracare_backend || true

      - name: Run Alembic migrations against temp DB
        env:
          SQLALCHEMY_DATABASE_URI: sqlite:///$(pwd)/ci_temp_db.sqlite
        run: |
          alembic -c netracare_backend/alembic.ini upgrade head
          python - <<'PY'
import sqlite3,sys
db='ci_temp_db.sqlite'
con=sqlite3.connect(db)
cur=con.cursor()
cur.execute("SELECT name FROM sqlite_master WHERE type='table'")
tables=[r[0] for r in cur.fetchall()]
print('tables:', tables)
assert 'user' in tables
print('Migration applied and validated')
PY
