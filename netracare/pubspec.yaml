name: netracare
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # iOS-style icons
  cupertino_icons: ^1.0.8

  # 📅 Date formatting
  intl: ^0.19.0

  # 🌐 HTTP client (Dart 3 compatible)
  http: ^1.2.1

  # 🔐 Secure storage for JWT / tokens
  flutter_secure_storage: ^8.0.0

  # 📸 Camera (Visual Acuity, Eye Tracking, Pupil Reflex)
  camera: ^0.10.5+9

  # 🔐 Camera & Storage Permissions
  permission_handler: ^11.3.1

  # 🧠 ML Kit for Face Detection & Distance Measurement
  google_mlkit_face_detection: ^0.10.0

  # 📊 Charts for data visualization
  fl_chart: ^0.69.2

  # 📄 PDF generation
  pdf: ^3.11.1
  path_provider: ^2.1.4
  path: ^1.9.0
  share_plus: ^10.1.3

  # 🖼️ Image Picker for profile photos
  image_picker: ^1.0.7

  # 🔑 Google Sign-In + Firebase Auth
  google_sign_in: ^6.2.2
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Recommended lint rules
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/netracare_logo.png
